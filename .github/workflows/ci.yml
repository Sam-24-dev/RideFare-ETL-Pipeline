name: ci

on:
  pull_request:
    branches: [master]
    paths-ignore:
      - "data/processed/analytics/web/**"
      - "data/processed/ml/web/**"
  push:
    branches: [master]
    paths-ignore:
      - "data/processed/analytics/web/**"
      - "data/processed/ml/web/**"

permissions:
  contents: read

jobs:
  python-quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[data,ml,dev]

      - name: Lint Python
        run: python -m ruff check .

      - name: Run Python test suite
        run: python -m pytest

      - name: Refresh public artifacts
        shell: pwsh
        run: ./scripts/refresh-public-artifacts.ps1 -RunId ci-refresh

      - name: Upload public web artifacts
        uses: actions/upload-artifact@v4
        with:
          name: public-web-artifacts
          path: |
            data/processed/analytics/web
            data/processed/ml/web
          if-no-files-found: error

  web-quality:
    needs: python-quality
    runs-on: ubuntu-latest
    env:
      RIDEFARE_PROJECT_ROOT: ${{ github.workspace }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Enable Corepack
        run: corepack enable

      - name: Install workspace dependencies
        run: corepack pnpm install --frozen-lockfile

      - name: Download public web artifacts
        uses: actions/download-artifact@v4
        with:
          name: public-web-artifacts
          path: .

      - name: Validate frontend
        run: |
          corepack pnpm --filter web test
          corepack pnpm --filter web lint
          corepack pnpm --filter web exec tsc --noEmit
          corepack pnpm --filter web build
