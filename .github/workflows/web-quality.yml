name: web-quality

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

jobs:
  web-quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Enable Corepack
        run: corepack enable

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[data,ml,dev]

      - name: Install workspace dependencies
        run: corepack pnpm install --frozen-lockfile

      - name: Generate sample artifacts
        run: |
          python -m ridefare ingest --rides-path data/samples/raw/PFDA_rides.csv --weather-path data/samples/raw/PFDA_weather.csv
          python -m ridefare transform
          python -m ridefare train --run-id ci-web
          python -m ridefare export-web --run-id ci-web

      - name: Validate frontend
        run: pwsh -File ./scripts/validate-web.ps1
