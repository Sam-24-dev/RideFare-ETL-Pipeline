name: pipeline-refresh

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - "src/ridefare/**"
      - "dbt/**"
      - "data/samples/raw/**"
      - "pyproject.toml"
      - "scripts/refresh-public-artifacts.ps1"
      - "apps/web/lib/data/**"

permissions:
  contents: write

jobs:
  refresh-public-artifacts:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[data,ml,dev]

      - name: Refresh public artifacts
        shell: pwsh
        run: ./scripts/refresh-public-artifacts.ps1 -RunId refresh-public

      - name: Detect artifact changes
        id: artifact-diff
        shell: bash
        run: |
          if git diff --quiet -- data/processed/analytics/web data/processed/ml/web; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            {
              echo "## Public artifact refresh"
              echo
              echo "No public artifact changes were detected."
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            {
              echo "## Public artifact refresh"
              echo
              echo "Updated public artifacts:"
              echo
              git diff --stat -- data/processed/analytics/web data/processed/ml/web
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Commit refreshed artifacts
        if: steps.artifact-diff.outputs.changed == 'true'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/processed/analytics/web data/processed/ml/web
          git commit -m "chore: refresh public web artifacts [skip ci]"
          git push
